<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting…</title>
  <script>
    // Any sub-path on theburnaylabs.pt → same path on burnaylabs.pt
    window.location.replace("https://burnaylabs.pt" + window.location.pathname + window.location.search + window.location.hash);
  </script>
</head>
<body>
  <p>Redirecting to <a id="link" href="https://burnaylabs.pt">burnaylabs.pt</a>…</p>
  <script>
    document.getElementById("link").href = "https://burnaylabs.pt" + window.location.pathname;
    document.getElementById("link").textContent = "burnaylabs.pt" + window.location.pathname;
  </script>
</body>
</html>
